  <style>
    :root {
      --bg: #07080F;
      --bg-surface: #0E101A;
      --border: rgba(255, 255, 255, 0.05);
      --primary: #FF5B26; /* Tomato Orange */
      --text: #F1F3FA;
      --text-muted: #8E9AB0;
      --text-dim: #5C677D;
      --font-sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255, 91, 38, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 600px;
      padding: 40px 24px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-family: var(--font-mono);
      font-size: 80px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 10px;
      letter-spacing: -0.05em;
    }

    h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    p {
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      background-color: var(--primary);
      color: #FFF;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      padding: 12px 28px;
      border-radius: 99px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(255, 91, 38, 0.25);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 91, 38, 0.35);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>404</h1>
    <h2>Oops! Page not found.</h2>
    <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    <a href="/" class="btn">Return Home</a>
  </div>

</body>
